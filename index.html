<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Tracker - 旅の記録</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar">
            <header>
                <h1>Travel Tracker</h1>
                <p>思い出の場所を地図に残そう</p>
            </header>
            <div id="controls">
                <button id="gallery-btn" class="primary-btn">写真ギャラリー</button>
                <button id="calendar-btn" class="primary-btn">カレンダー</button>
                <button id="export-btn" class="secondary-btn">データ保存</button>
            </div>
            <ul id="spot-list">
                <!-- 記録がここに表示されます -->
            </ul>
        </aside>
        <main id="map-container">
            <button id="sidebar-toggle" class="mobile-only" title="リストを表示">☰</button>
            <div id="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="map-search" placeholder="住所、店名、場所を検索...">
            </div>
            <div id="map"></div>
            <button id="fab-add" title="新しい思い出を追加">+</button>
        </main>
    </div>

    <!-- ギャラリーモーダル -->
    <div id="gallery-overlay" class="hidden">
        <div id="gallery-modal">
            <header class="modal-header">
                <h2>写真ギャラリー</h2>
                <button id="close-gallery" class="close-btn">&times;</button>
            </header>
            <div id="gallery-content">
                <!-- 写真がここに並びます -->
            </div>
        </div>
    </div>

    <!-- カレンダーモーダル -->
    <div id="calendar-overlay" class="hidden">
        <div id="calendar-modal">
            <header class="modal-header">
                <div class="calendar-nav">
                    <button id="prev-month" class="nav-btn">&lt;</button>
                    <h2 id="calendar-month-year">2026年5月</h2>
                    <button id="next-month" class="nav-btn">&gt;</button>
                </div>
                <button id="close-calendar" class="close-btn">&times;</button>
            </header>
            <div id="calendar-grid-container">
                <div class="calendar-weekdays">
                    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
                </div>
                <div id="calendar-grid"></div>
            </div>
            <div id="calendar-day-details" class="hidden">
                <h3 id="selected-date-label">2026/05/15</h3>
                <ul id="day-spot-list"></ul>
            </div>
        </div>
    </div>

    <!-- 削除確認モーダル -->
    <div id="confirm-overlay" class="hidden">
        <div id="confirm-modal">
            <h3>記録を削除しますか？</h3>
            <p>この操作は取り消せません。</p>
            <div class="button-group">
                <button id="confirm-cancel" class="secondary-btn">キャンセル</button>
                <button id="confirm-delete" class="delete-btn-modal">削除する</button>
            </div>
        </div>
    </div>

    <!-- 検索エラーモーダル -->
    <div id="error-overlay" class="hidden">
        <div id="error-modal" class="confirm-modal-style">
            <h3>場所が見つかりませんでした</h3>
            <p>住所や店名を変えて、もう一度試してみてください。</p>
            <div class="button-group">
                <button id="error-close" class="primary-btn">わかりました</button>
            </div>
        </div>
    </div>

    <!-- 入力モーダル -->
    <div id="modal-overlay" class="hidden">
        <div id="input-modal">
            <h2>新しい思い出を記録</h2>
            <form id="record-form">
                <div class="form-group">
                    <label for="title">場所の名前</label>
                    <div class="input-with-button">
                        <input type="text" id="title" required placeholder="例: 富士山頂">
                        <button type="button" id="modal-search-btn" class="secondary-btn small-btn" title="場所を検索して地図を移動">検索</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="date">日付</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="description">思い出</label>
                    <textarea id="description" rows="3" placeholder="どんなことがありましたか？"></textarea>
                </div>
                <div class="form-group">
                    <label for="photo">写真</label>
                    <input type="file" id="photo" accept="image/*">
                    <p class="hint">※写真はリサイズして保存されます</p>
                </div>
                <div class="button-group">
                    <button type="button" id="cancel-btn" class="secondary-btn">キャンセル</button>
                    <button type="submit" class="primary-btn">記録する</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
